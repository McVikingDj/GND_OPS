<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gullknapp Ops Strip Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>GULLKNAPP OPS STRIP BOARD</h1>

<div class="board">
    <div class="column" data-column="inbound">
        <h2>INBOUND</h2>
        <div class="strip-container"></div>
    </div>

    <div class="column" data-column="ground">
        <h2>ON GROUND</h2>
        <div class="strip-container"></div>
    </div>

    <div class="column" data-column="turnaround">
        <h2>TURNAROUND</h2>
        <div class="strip-container"></div>
    </div>

    <div class="column" data-column="ready">
        <h2>READY</h2>
        <div class="strip-container"></div>
    </div>

    <div class="column" data-column="departed">
        <h2>DEPARTED</h2>
        <div class="strip-container"></div>
    </div>
</div>

<button id="newStripBtn">+ New Strip</button>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="script.js"></script>

</body>
</html>
